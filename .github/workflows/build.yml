name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Extrair ZIP
        run: unzip LookDoDia-Expo.zip
      - name: Instalar dependências
        run: cd LookDoDia && npm install
      - name: Instalar EAS
        run: npm install -g eas-cli
      - name: Build APK
        run: cd LookDoDia && eas build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
